oid4vp.enabled=true
oid4vp.clientId=test
oid4vp.scope=openid,edc
oid4vp.trustAll=false
oid4vp.credentialsFolder=/credentials
oid4vp.trustAnchorsFolder=/trust-anchors
oid4vp.organizationClaim=issuer
oid4vp.holder.signatureAlgorithm=ECDH-ES
oid4vp.holder.key.type=EC
oid4vp.holder.key.path=/my/key.pem
oid4vp.proxy.enabled=true
oid4vp.proxy.host=localhost
oid4vp.proxy.port=8888
